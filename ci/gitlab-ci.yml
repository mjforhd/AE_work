# A Chat QA Pipeline — GitLab CI/CD
#
# 사용 방법:
#   이 파일을 루트의 .gitlab-ci.yml 로 복사하거나,
#   Settings › CI/CD › General pipelines › Custom CI/CD configuration file 에서
#   경로를 "ci/gitlab-ci.yml" 로 지정하면 됩니다.
#
# 파이프라인 4단계 구조 (CICD_DESIGN.md §1 기반):
#   unit-test      : MR 포함 항상 실행. API 호출 없음.
#   integration    : main 병합·nightly만. 실제 API 호출 + Blocking 게이트.
#   benchmark      : integration 통과 후. 모델 비교 리포트.
#   judge          : nightly만. LLM Judge 채점.
#
# Secret 변수 설정 위치:
#   Settings › CI/CD › Variables 에서 아래 변수를 Masked + Protected 로 추가
#   - OPENAI_API_KEY
#   - ANTHROPIC_API_KEY
#   - GOOGLE_API_KEY
#   - SLACK_WEBHOOK_URL

stages:
  - unit-test
  - integration
  - benchmark
  - judge

variables:
  PYTHON_IMAGE: "python:3.11-slim"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

# pip 캐시 — 브랜치별로 공유해 설치 시간 단축
cache:
  key: "pip-$CI_COMMIT_REF_SLUG"
  paths:
    - .pip-cache/

# ────────────────────────────────────────────────────────────────────────────
# 1. 단위 테스트 — MR 포함 항상 실행
#    API 호출 없음. 스키마·Validator·어댑터 단위 로직 회귀 차단.
# ────────────────────────────────────────────────────────────────────────────
unit-test:
  stage: unit-test
  image: $PYTHON_IMAGE
  script:
    - pip install -r requirements.txt -q
    - python -m pytest -m "not api"
        --tb=short
        --junitxml=reports/junit-unit.xml
        -v
  artifacts:
    when: always
    reports:
      junit: reports/junit-unit.xml
    expire_in: 30 days
  rules:
    - when: always   # MR·push·schedule 모두 실행

# ────────────────────────────────────────────────────────────────────────────
# 2. 통합 테스트 — main 병합 / nightly만
#    실제 LLM API 호출. Blocking 게이트 판정.
#    실패 시 → exit ≠ 0 → 이후 배포 스테이지 자동 차단 (NO-GO).
# ────────────────────────────────────────────────────────────────────────────
integration-test:
  stage: integration
  image: $PYTHON_IMAGE
  needs: [unit-test]
  script:
    - pip install -r requirements.txt -q
    # Blocking 항목 포함 통합 테스트
    - python -m pytest -m "api and not slow"
        --tb=short
        --junitxml=reports/junit-integration.xml
        -v
  after_script:
    # Blocking 실패 시 Slack 알림 (CICD_DESIGN.md §3)
    - |
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-Type: application/json' \
          -d "{
            \"attachments\": [{
              \"color\": \"danger\",
              \"title\": \"🚨 [A Chat QA] 통합 테스트 실패 — 배포 차단 (NO-GO)\",
              \"fields\": [
                {\"title\": \"브랜치\",     \"value\": \"\`$CI_COMMIT_BRANCH\`\",    \"short\": true},
                {\"title\": \"커밋\",       \"value\": \"\`$CI_COMMIT_SHORT_SHA\`\", \"short\": true},
                {\"title\": \"트리거\",     \"value\": \"\`$CI_PIPELINE_SOURCE\`\",  \"short\": true},
                {\"title\": \"파이프라인\", \"value\": \"<$CI_PIPELINE_URL|확인하기>\", \"short\": true}
              ]
            }]
          }"
      fi
  artifacts:
    when: always
    reports:
      junit: reports/junit-integration.xml
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# nightly에는 slow 포함 전체 실행
integration-test-full:
  stage: integration
  image: $PYTHON_IMAGE
  needs: [unit-test]
  script:
    - pip install -r requirements.txt -q
    - python -m pytest -m "api and slow"
        --tb=short
        --junitxml=reports/junit-slow.xml
        -v
  artifacts:
    when: always
    reports:
      junit: reports/junit-slow.xml
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# ────────────────────────────────────────────────────────────────────────────
# 3. 모델 비교 벤치마크 리포트 — 통합 테스트 통과 후
#    5개 프롬프트 × 3개 모델 성능·품질 지표 비교.
#    아티팩트를 90일 보관 → 시계열 Baseline/Drift 추적 (PART 1 §8.3).
# ────────────────────────────────────────────────────────────────────────────
benchmark:
  stage: benchmark
  image: $PYTHON_IMAGE
  needs: [integration-test]
  script:
    - pip install -r requirements.txt -q
    - python -m reports.reporter
        --output reports/benchmark_results.json
        --max-tokens 300
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        curl -s -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-Type: application/json' \
          -d "{
            \"attachments\": [{
              \"color\": \"warning\",
              \"title\": \"⚠️ [A Chat QA] 벤치마크 이상 감지 (HOLD 후보)\",
              \"text\": \"모델 성능·품질 지표 이상. 리포트를 확인하세요.\",
              \"fields\": [
                {\"title\": \"파이프라인\", \"value\": \"<$CI_PIPELINE_URL|확인하기>\"}
              ]
            }]
          }"
      fi
  artifacts:
    when: always
    paths:
      - reports/benchmark_results.json
    expire_in: 90 days   # Baseline 장기 추적
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# ────────────────────────────────────────────────────────────────────────────
# 4. LLM Judge 자동 채점 — nightly 스케줄만 (API 비용 절감)
#    Cross-evaluation 기반 4기준 자동 채점.
#    Human Review 필요 항목은 로그에 WARNING으로 기록됨.
# ────────────────────────────────────────────────────────────────────────────
llm-judge:
  stage: judge
  image: $PYTHON_IMAGE
  needs: [integration-test]
  script:
    - pip install -r requirements.txt -q
    - python -m judge.llm_judge
        --prompts 3
        --consistency-runs 3
        2>&1 | tee reports/llm-judge.log
  artifacts:
    when: always
    paths:
      - reports/llm-judge.log
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
